name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare log folder
        run: mkdir -p build-logs

      - name: Print tool versions
        run: |
          {
            echo "Node:" && node --version
            echo "NPM:" && npm --version
            echo "Ruby:" && ruby --version
            echo "CocoaPods:" && pod --version || true
            echo "Xcode:" && xcodebuild -version
            echo "macOS:" && sw_vers
          } 2>&1 | tee build-logs/00-versions.log

      - name: Install JS dependencies
        run: |
          set -o pipefail
          npm install 2>&1 | tee build-logs/01-npm-install.log

      - name: Restore GoogleService-Info.plist
        run: |
          set -e
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/GoogleService-Info.plist
          ls -l ios/GoogleService-Info.plist | tee build-logs/02-google-service-file.log
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Install CocoaPods
        run: |
          set -o pipefail
          cd ios
          pod install 2>&1 | tee ../build-logs/03-pod-install.log

      - name: Verify Firebase pod layout
        run: |
          {
            echo "Firebase-related pods in Podfile.lock after pod install:"
            grep -n "Firebase\|GoogleUtilities\|RNFB" ios/Podfile.lock | head -n 120 || true
            echo "GoogleUtilities headers found under ios/Pods:"
            find ios/Pods -name "GULAppDelegateSwizzler.h" -o -name "GULAppDelegateSwizzler_Private.h" | sort || true
            echo "Problematic private header import, if present:"
            grep -R -n "GoogleUtilities/.*/Public/GoogleUtilities" ios/Pods/Headers/Public/GoogleUtilities 2>/dev/null || true
          } 2>&1 | tee build-logs/03b-firebase-pod-layout.log

      - name: Build unsigned iOS app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/ReaderApp.xcworkspace \
            -scheme ReaderApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.davidpovarsky.sefariareader \
            build 2>&1 | tee build-logs/04-xcodebuild.log

      - name: Package IPA
        run: |
          set -e
          rm -rf Payload SefariaReader.ipa
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" | tee build-logs/05-package.log
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" | tee -a build-logs/05-package.log
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r SefariaReader.ipa Payload 2>&1 | tee -a build-logs/05-package.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SefariaReader-IPA
          path: SefariaReader.ipa

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build-logs/
