name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare log folder
        run: mkdir -p build-logs

      - name: Print tool versions
        run: |
          {
            echo "Node:" && node --version
            echo "NPM:" && npm --version
            echo "Ruby:" && ruby --version
            echo "CocoaPods:" && pod --version || true
            echo "Xcode:" && xcodebuild -version
            echo "macOS:" && sw_vers
          } 2>&1 | tee build-logs/00-versions.log

      - name: Fast fail if Firebase source references remain
        run: |
          set -o pipefail
          {
            echo "Scanning source files for removed Firebase references..."
            FOUND=0
            grep -R -n "@react-native-firebase" . --exclude-dir=.git --exclude-dir=.github --exclude-dir=node_modules --exclude-dir=Pods --exclude-dir=build --exclude-dir=build-logs --exclude=package-lock.json --exclude=Podfile.lock && FOUND=1 || true
            grep -R -n "FirebaseCore" ios index.js ReaderApp.js StateManager.js 2>/dev/null && FOUND=1 || true
            grep -R -n "FirebaseApp.configure" ios index.js ReaderApp.js StateManager.js 2>/dev/null && FOUND=1 || true
            if [ "$FOUND" = "1" ]; then
              echo "ERROR: Firebase references remain in source. Stopping before npm/pods/xcodebuild."
              exit 1
            fi
            echo "OK: no Firebase source references found."
          } 2>&1 | tee build-logs/00b-fast-fail-source-scan.log

      - name: Install JS dependencies
        run: |
          set -o pipefail
          npm install 2>&1 | tee build-logs/01-npm-install.log

      - name: Remove leftover Firebase packages from install tree
        run: |
          set -o pipefail
          rm -rf node_modules/@react-native-firebase
          if [ -d node_modules/@react-native-firebase ]; then
            echo "ERROR: node_modules/@react-native-firebase still exists" | tee build-logs/01b-remove-firebase.log
            exit 1
          fi
          echo "OK: Firebase JS packages are absent from node_modules." | tee build-logs/01b-remove-firebase.log

      - name: Bundle JS before Xcode build
        run: |
          set -o pipefail
          mkdir -p build-logs/jsbundle-assets
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output build-logs/main.jsbundle \
            --assets-dest build-logs/jsbundle-assets 2>&1 | tee build-logs/02-js-bundle.log

      - name: Install CocoaPods
        run: |
          set -o pipefail
          cd ios
          pod install 2>&1 | tee ../build-logs/03-pod-install.log

      - name: Verify Firebase pods are absent
        run: |
          set -o pipefail
          {
            echo "Checking Podfile.lock for Firebase/Google/RNFB pods..."
            FOUND=0
            grep -n "Firebase" ios/Podfile.lock && FOUND=1 || true
            grep -n "GoogleUtilities" ios/Podfile.lock && FOUND=1 || true
            grep -n "RNFB" ios/Podfile.lock && FOUND=1 || true
            if [ "$FOUND" = "1" ]; then
              echo "ERROR: Firebase-related pods are still present. Stopping before xcodebuild."
              exit 1
            fi
            echo "OK: no Firebase-related pods found."
          } 2>&1 | tee build-logs/03b-no-firebase-pod-check.log

      - name: Build unsigned iOS app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/ReaderApp.xcworkspace \
            -scheme ReaderApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.davidpovarsky.sefariareader \
            build 2>&1 | tee build-logs/04-xcodebuild.log

      - name: Package IPA
        run: |
          set -e
          rm -rf Payload SefariaReader.ipa
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" | tee build-logs/05-package.log
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" | tee -a build-logs/05-package.log
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r SefariaReader.ipa Payload 2>&1 | tee -a build-logs/05-package.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SefariaReader-IPA
          path: SefariaReader.ipa

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build-logs/
