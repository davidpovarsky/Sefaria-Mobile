name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare log folder
        run: mkdir -p build-logs

      - name: Print tool versions
        run: |
          {
            echo "Node:" && node --version
            echo "NPM:" && npm --version
            echo "Ruby:" && ruby --version
            echo "CocoaPods:" && pod --version || true
            echo "Xcode:" && xcodebuild -version
            echo "macOS:" && sw_vers
          } 2>&1 | tee build-logs/00-versions.log

      - name: Install JS dependencies
        run: |
          npm install 2>&1 | tee build-logs/01-npm-install.log

      - name: Restore GoogleService-Info.plist
        run: |
          set -e
          echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/GoogleService-Info.plist
          ls -l ios/GoogleService-Info.plist | tee build-logs/02-google-service-file.log
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}

      - name: Install CocoaPods
        run: |
          cd ios
          pod install 2>&1 | tee ../build-logs/03-pod-install.log

      - name: Patch GoogleUtilities imports in Pods
        run: |
          set -e
          python3 - <<'PY' 2>&1 | tee build-logs/03b-googleutilities-header-patch.log
          import os
          import re

          root = "ios/Pods"
          pattern = re.compile(r'#import "GoogleUtilities/[^\"]+/Public/GoogleUtilities/([^\"]+)"')
          patched = []
          remaining = []

          for dirpath, dirnames, filenames in os.walk(root, followlinks=True):
              for filename in filenames:
                  if not filename.endswith((".h", ".m", ".mm", ".swift", ".modulemap")):
                      continue
                  path = os.path.join(dirpath, filename)
                  try:
                      with open(path, "r", encoding="utf-8", errors="ignore") as f:
                          old = f.read()
                  except OSError:
                      continue

                  new = pattern.sub(r'#import "\1"', old)
                  if new != old:
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(new)
                      patched.append(path)

          for dirpath, dirnames, filenames in os.walk(root, followlinks=True):
              for filename in filenames:
                  if not filename.endswith((".h", ".m", ".mm", ".swift", ".modulemap")):
                      continue
                  path = os.path.join(dirpath, filename)
                  try:
                      with open(path, "r", encoding="utf-8", errors="ignore") as f:
                          text = f.read()
                  except OSError:
                      continue
                  if pattern.search(text):
                      remaining.append(path)

          print(f"Patched files: {len(patched)}")
          for path in patched[:100]:
              print(f"PATCHED {path}")
          if len(patched) > 100:
              print(f"... and {len(patched) - 100} more")

          print(f"Remaining broken imports: {len(remaining)}")
          for path in remaining[:100]:
              print(f"REMAINING {path}")

          if remaining:
              raise SystemExit(1)
          PY

      - name: Build unsigned iOS app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/ReaderApp.xcworkspace \
            -scheme ReaderApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.davidpovarsky.sefariareader \
            build 2>&1 | tee build-logs/04-xcodebuild.log

      - name: Package IPA
        run: |
          set -e
          rm -rf Payload SefariaReader.ipa
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" | tee build-logs/05-package.log
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" | tee -a build-logs/05-package.log
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r SefariaReader.ipa Payload 2>&1 | tee -a build-logs/05-package.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SefariaReader-IPA
          path: SefariaReader.ipa

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build-logs/
