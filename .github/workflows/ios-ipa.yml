name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Prepare log folder
        run: mkdir -p build-logs

      - name: Print tool versions
        run: |
          {
            echo "Node:" && node --version
            echo "NPM:" && npm --version
            echo "Ruby:" && ruby --version
            echo "CocoaPods:" && pod --version || true
            echo "Xcode:" && xcodebuild -version
            echo "macOS:" && sw_vers
          } 2>&1 | tee build-logs/00-versions.log

      - name: Fast fail if AppDelegate still initializes Firebase
        run: |
          set -o pipefail
          {
            echo "Scanning app delegate for native Firebase initialization..."
            FOUND=0
            grep -n "FirebaseCore" ios/ReaderApp/AppDelegate.swift && FOUND=1 || true
            grep -n "FirebaseApp.configure" ios/ReaderApp/AppDelegate.swift && FOUND=1 || true
            if [ "$FOUND" = "1" ]; then
              echo "ERROR: AppDelegate still initializes Firebase."
              exit 1
            fi
            echo "OK: AppDelegate has no Firebase initialization."
          } 2>&1 | tee build-logs/00b-fast-fail-appdelegate-scan.log

      - name: Install JS dependencies
        run: |
          set -o pipefail
          npm install 2>&1 | tee build-logs/01-npm-install.log

      - name: Replace Firebase JS packages with no-op shims
        run: |
          set -o pipefail
          rm -rf node_modules/@react-native-firebase
          mkdir -p node_modules/@react-native-firebase/app
          mkdir -p node_modules/@react-native-firebase/analytics
          mkdir -p node_modules/@react-native-firebase/crashlytics
          mkdir -p node_modules/@react-native-firebase/remote-config
          cat > node_modules/@react-native-firebase/app/package.json <<'EOF'
          {"name":"@react-native-firebase/app","version":"0.0.0","main":"index.js"}
          EOF
          cat > node_modules/@react-native-firebase/app/index.js <<'EOF'
          module.exports = function firebaseApp() { return {}; };
          EOF
          cat > node_modules/@react-native-firebase/analytics/package.json <<'EOF'
          {"name":"@react-native-firebase/analytics","version":"0.0.0","main":"index.js"}
          EOF
          cat > node_modules/@react-native-firebase/analytics/index.js <<'EOF'
          function getAnalytics() { return {}; }
          function logEvent() { return Promise.resolve(); }
          function setAnalyticsCollectionEnabled() { return Promise.resolve(); }
          function analytics() { return { logEvent, setAnalyticsCollectionEnabled }; }
          module.exports = analytics;
          module.exports.default = analytics;
          module.exports.getAnalytics = getAnalytics;
          module.exports.logEvent = logEvent;
          module.exports.setAnalyticsCollectionEnabled = setAnalyticsCollectionEnabled;
          EOF
          cat > node_modules/@react-native-firebase/crashlytics/package.json <<'EOF'
          {"name":"@react-native-firebase/crashlytics","version":"0.0.0","main":"index.js"}
          EOF
          cat > node_modules/@react-native-firebase/crashlytics/index.js <<'EOF'
          function getCrashlytics() { return {}; }
          function recordError() { return Promise.resolve(); }
          function setAttribute() { return Promise.resolve(); }
          function log() { return Promise.resolve(); }
          function crashlytics() { return { recordError, setAttribute, log }; }
          module.exports = crashlytics;
          module.exports.default = crashlytics;
          module.exports.getCrashlytics = getCrashlytics;
          module.exports.recordError = recordError;
          module.exports.setAttribute = setAttribute;
          module.exports.log = log;
          EOF
          cat > node_modules/@react-native-firebase/remote-config/package.json <<'EOF'
          {"name":"@react-native-firebase/remote-config","version":"0.0.0","main":"index.js"}
          EOF
          cat > node_modules/@react-native-firebase/remote-config/index.js <<'EOF'
          function remoteConfig() { return { setDefaults: function(){return Promise.resolve();}, fetch: function(){return Promise.resolve();}, activate: function(){return Promise.resolve(false);}, getValue: function(){return { asString: function(){return '';}, asBoolean: function(){return false;}, asNumber: function(){return 0;} };} }; }
          module.exports = remoteConfig;
          module.exports.default = remoteConfig;
          EOF
          echo "OK: Firebase JS imports are satisfied by no-op shims." | tee build-logs/01b-firebase-shims.log

      - name: Bundle JS before Xcode build
        run: |
          set -o pipefail
          mkdir -p build-logs/jsbundle-assets
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output build-logs/main.jsbundle \
            --assets-dest build-logs/jsbundle-assets 2>&1 | tee build-logs/02-js-bundle.log

      - name: Remove stale CocoaPods checkout artifacts
        run: |
          set -e
          rm -rf ios/Pods ios/Podfile.lock ios/ReaderApp.xcworkspace
          echo "Removed stale Pods, Podfile.lock, and workspace before fresh pod install." | tee build-logs/02b-clean-pods.log

      - name: Install CocoaPods
        run: |
          set -o pipefail
          cd ios
          pod install 2>&1 | tee ../build-logs/03-pod-install.log

      - name: Verify Firebase pods are absent
        run: |
          set -o pipefail
          {
            echo "Checking Podfile.lock for Firebase/Google/RNFB pods..."
            FOUND=0
            grep -n "Firebase" ios/Podfile.lock && FOUND=1 || true
            grep -n "GoogleUtilities" ios/Podfile.lock && FOUND=1 || true
            grep -n "RNFB" ios/Podfile.lock && FOUND=1 || true
            if [ "$FOUND" = "1" ]; then
              echo "ERROR: Firebase-related pods are still present."
              exit 1
            fi
            echo "OK: no Firebase-related pods found."
          } 2>&1 | tee build-logs/03b-no-firebase-pod-check.log

      - name: Build unsigned iOS app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/ReaderApp.xcworkspace \
            -scheme ReaderApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.davidpovarsky.sefariareader \
            build 2>&1 | tee build-logs/04-xcodebuild.log

      - name: Package IPA
        run: |
          set -e
          rm -rf Payload SefariaReader.ipa
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" | tee build-logs/05-package.log
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" | tee -a build-logs/05-package.log
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r SefariaReader.ipa Payload 2>&1 | tee -a build-logs/05-package.log

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SefariaReader-IPA
          path: SefariaReader.ipa

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build-logs/
